name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# Ruff is a standalone binary and needs no project dependencies, so the lint
# job runs it directly via uvx and does not install the Home Assistant stack.
# Keep the ruff version aligned with the repo target (pyproject required-version).

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.5"

      - name: Check code format
        run: uvx ruff@0.13.0 format --check .

      - name: Lint with Ruff
        run: uvx ruff@0.13.0 check .
