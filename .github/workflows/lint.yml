name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# Ruff is a standalone binary and needs no project dependencies, so the lint
# job runs it directly via uvx and does not install the Home Assistant stack.
# Keep the ruff version aligned with the repo target (pyproject required-version).

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"

      - name: Check code format
        run: uvx ruff@0.13.0 format --check .

      - name: Lint with Ruff
        run: uvx ruff@0.13.0 check .
