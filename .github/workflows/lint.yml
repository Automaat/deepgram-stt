name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# Ruff is a standalone binary and needs no project dependencies, so the lint
# job runs it directly via uvx and does not install the Home Assistant stack.
# Keep the ruff version aligned with the repo target (pyproject required-version).

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          version: "0.10.5"

      - name: Check code format
        run: uvx ruff@0.13.0 format --check .

      - name: Lint with Ruff
        run: uvx ruff@0.13.0 check .
