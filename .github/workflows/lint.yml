name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

# Ruff is a standalone binary and needs no project dependencies, so the lint
# job runs it directly via uvx and does not install the Home Assistant stack.
# Keep the ruff version aligned with the repo target (pyproject required-version).

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          version: "0.11.28"

      - name: Check code format
        run: uvx ruff@0.13.0 format --check .

      - name: Lint with Ruff
        run: uvx ruff@0.13.0 check .
